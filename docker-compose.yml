version: "3.9"

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      redis:
        condition: service_healthy # Ensures the app waits until Redis passes the healthcheck

  redis:
    image: redis:7-alpine
    container_name: distributed-rate-limiter-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5